<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="description" content="Placar de Basquete Mobile PWA">
    <title>SPARTA BASKETBALL PERNAMBUCO</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* ---------- RESET & VARIÁVEIS ---------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --cor-fundo: #121212;
            --cor-texto: #e0e0e0;
            --cor-branco: #ffffff;
            --cor-azul: #1a73e8;
            --cor-destaque: #4CAF50;
            --cor-alerta: #f44336;
            --cor-botao: #333333;
            --cor-botao-hover: #454545;
            --amarelo-posse: #FFD700;
            --fonte: 'Roboto', Arial, sans-serif;
        }
        body {
            font-family: var(--fonte);
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #app {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            border: none;
            border-radius: 8px;
            background-color: var(--cor-botao);
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            user-select: none;
            touch-action: manipulation;
            font-family: var(--fonte);
            font-size: 0.9rem;
            padding: 12px 5px;
        }
        button:hover,
        button:active {
            background-color: var(--cor-botao-hover);
        }
        .btn-point {
            font-weight: bold;
        }
        .btn-foul {
            background-color: #d32f2f;
        }
        .btn-foul:hover {
            background-color: #f44336;
        }
        .btn-start {
            background-color: var(--cor-destaque);
        }
        .btn-start:hover {
            background-color: #45a049;
        }
        .btn-reset {
            background-color: #ff9800;
        }
        .btn-reset:hover {
            background-color: #fb8c00;
        }
        .btn-timeout {
            background-color: #2196F3;
        }
        .btn-timeout:hover {
            background-color: #0b7dda;
        }
        .btn-horn {
            background-color: var(--cor-alerta);
        }
        .btn-horn:hover {
            background-color: #e53935;
        }
        .btn-fullscreen {
            background-color: #9c27b0;
        }
        .btn-fullscreen:hover {
            background-color: #7b1fa2;
        }
        .btn-simple {
            background-color: #FF9800;
        }
        .btn-simple:hover {
            background-color: #F57C00;
        }
        .btn-config {
            background-color: #607d8b;
        }
        .btn-config:hover {
            background-color: #455a64;
        }
        .btn-action {
            font-weight: bold;
        }

        /* ---------- PLACAR ---------- */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 5px;
        }
        .team-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 10px 10px 0 0;
            overflow: hidden;
        }
        .team {
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 120px;
        }
        .team-white {
            background-color: var(--cor-branco);
            color: #000;
        }
        .team-blue {
            background-color: var(--cor-azul);
            color: var(--cor-branco);
        }
        .team-name {
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            word-break: break-word;
            margin-bottom: 5px;
        }
        .team-score-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .team-score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
            transition: transform 0.2s;
        }
        .score-updated {
            transform: scale(1.15);
            color: var(--cor-destaque);
        }
        .score-box {
            position: absolute;
            inset: 0;
            cursor: pointer;
            opacity: 0.3;
            border-radius: 5px;
        }
        .score-box:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* ---------- FALTAS ---------- */
        .foul-box {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            position: relative;
            margin-top: 5px;
            border-radius: 0 0 8px 8px;
            cursor: default;
        }
        .foul-white {
            background-color: var(--cor-branco);
            color: #000;
        }
        .foul-blue {
            background-color: var(--cor-azul);
            color: var(--cor-branco);
        }
        .foul-box-click {
            position: absolute;
            inset: 0;
            cursor: pointer;
            opacity: 0.3;
            border-radius: 5px;
        }
        .foul-box-click:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .blinking {
            animation: blink 1s infinite;
            background-color: var(--cor-alerta) !important;
        }

        /* ---------- CONTROLES DOS TIMES ---------- */
        .team-controls {
            display: flex;
            gap: 10px;
        }
        .control-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-row {
            display: flex;
            gap: 8px;
        }
        .control-row button {
            flex: 1;
        }

        /* ---------- PERÍODO ---------- */
        .period-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 5px 0;
        }
        .period-text {
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        /* ---------- CRONÔMETROS ---------- */
        .timer-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .timer-box {
            background-color: var(--cor-botao);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer-box .btn {
            padding: 10px 15px;
        }
        .timer-display {
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Roboto Mono', monospace;
            text-align: center;
        }
        .timer-label {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 4px;
        }
        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .timer-controls .btn {
            flex: 1;
            min-width: 60px;
        }

        /* ---------- AÇÕES ---------- */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }
        .action-row {
            display: flex;
            gap: 10px;
        }
        .action-row .btn {
            flex: 1;
        }

        /* ---------- CONFIG ---------- */
        .config-menu {
            background-color: var(--cor-botao);
            border-radius: 10px;
            padding: 0;
            margin-top: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
        }
        .config-menu.open {
            max-height: 700px;
            padding: 15px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: #222;
            color: white;
            font-size: 1rem;
        }
        .time-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .time-options .btn {
            flex: 1;
            min-width: calc(50% - 4px);
            padding: 8px;
        }
        .config-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .config-buttons .btn {
            flex: 1;
        }
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
        }
        .toggle-label {
            font-weight: bold;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }
        .toggle-slider::before {
            content: "";
            position: absolute;
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        input:checked+.toggle-slider {
            background-color: var(--cor-destaque);
        }
        input:checked+.toggle-slider::before {
            transform: translateX(26px);
        }
        .game-mode-selector {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 10px 0;
        }
        .mode-btn {
            padding: 8px 20px;
            background-color: #333;
            color: white;
            border-radius: 0;
            flex: 1;
        }
        .mode-btn:first-child {
            border-radius: 8px 0 0 8px;
        }
        .mode-btn:last-child {
            border-radius: 0 8px 8px 0;
        }
        .mode-btn.active {
            background-color: var(--cor-azul);
            font-weight: bold;
        }

        /* ---------- MODO SIMPLES ---------- */
        .simple-mode {
            display: none;
            position: fixed;
            inset: 0;
            background-color: var(--cor-fundo);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            touch-action: pan-y;
            cursor: none;
        }
        .simple-mode.active {
            display: flex;
        }
        .simple-scoreboard {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: space-between;
            align-items: stretch;
            gap: 10px;
            touch-action: pan-y;
        }
        .simple-team {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100%;
            touch-action: pan-y;
            border-radius: 10px;
            overflow: hidden;
        }
        .simple-team-name {
            font-size: 5vw;
            font-weight: bold;
            text-align: center;
            padding: 10px 0;
            word-break: break-word;
        }
        .simple-team-name-white {
            background-color: var(--cor-branco);
            color: #000;
        }
        .simple-team-name-blue {
            background-color: var(--cor-azul);
            color: var(--cor-branco);
        }
        .simple-team-score {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40vw;
            font-weight: bold;
            position: relative;
            touch-action: pan-y;
            background-color: var(--cor-branco);
            color: #000;
        }
        .simple-team-score.blue {
            background-color: var(--cor-azul);
            color: var(--cor-branco);
        }
        .simple-team-fouls {
            padding: 10px;
            font-size: 6vw;
            font-weight: bold;
            text-align: center;
            position: relative;
            touch-action: pan-y;
            background-color: var(--cor-branco);
            color: #000;
        }
        .simple-team-fouls.blue {
            background-color: var(--cor-azul);
            color: var(--cor-branco);
        }
        .simple-team-fouls .foul-box-click {
            position: absolute;
            inset: 0;
            cursor: pointer;
            opacity: 0.3;
        }
        .simple-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 0 5px;
            height: 100%;
            touch-action: pan-y;
            min-width: 80px;
        }
        .simple-logo {
            height: 20vh;
            width: auto;
            cursor: pointer;
        }
        .simple-timer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
        }
        .simple-game-minutes {
            font-size: 10vw;
            font-weight: bold;
            line-height: 1;
        }
        .simple-game-seconds {
            font-size: 5vw;
            font-weight: bold;
            opacity: 0.9;
            line-height: 1;
        }
        .simple-divider {
            width: 70%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 5px 0;
        }
        .simple-shot-clock-container.hidden {
            display: none;
        }
        .simple-shot-clock {
            font-size: 12vw;
            font-weight: bold;
            font-family: 'Roboto Mono', monospace;
            text-align: center;
            color: var(--amarelo-posse);
        }
        .simple-period {
            font-size: 4vw;
            font-weight: bold;
            text-align: center;
        }

        /* ---------- RESPONSIVO ---------- */
        @media (max-width: 350px) {
            .team-score {
                font-size: 2rem;
            }
            .btn {
                font-size: 0.75rem;
                padding: 8px 3px;
            }
            .timer-display {
                font-size: 1.4rem;
            }
        }
        @media (min-width: 800px) {
            .simple-team-name {
                font-size: 40px;
            }
            .simple-team-score {
                font-size: 320px;
            }
            .simple-team-fouls {
                font-size: 48px;
            }
            .simple-game-minutes {
                font-size: 80px;
            }
            .simple-game-seconds {
                font-size: 40px;
            }
            .simple-shot-clock {
                font-size: 96px;
            }
            .simple-period {
                font-size: 32px;
            }
        }

        /* Botão instalar */
        #installButton {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- =================== APP PRINCIPAL =================== -->
    <div id="app">

        <!-- PLACAR -->
        <div class="scoreboard">
            <!-- Time Branco -->
            <div class="team-wrapper">
                <div class="team team-white">
                    <div class="team-name" id="white-team-name-display">Branco</div>
                    <div class="team-score-container">
                        <div class="team-score" id="white-score">0</div>
                        <div class="score-box" id="white-score-box" title="Clique para subtrair 1"></div>
                    </div>
                </div>
                <div class="foul-box foul-white" id="white-foul">
                    <span id="white-foul-count">0</span>
                    <div class="foul-box-click" id="white-foul-click" title="Clique para subtrair 1 falta"></div>
                </div>
            </div>

            <!-- Logo central -->
            <div class="logo-container" style="display:flex; align-items:center; padding:0 5px;">
                <img src="basquete.gif" alt="Basquete" style="height:50px; width:auto;">
            </div>

            <!-- Time Azul -->
            <div class="team-wrapper">
                <div class="team team-blue">
                    <div class="team-name" id="blue-team-name-display">Azul</div>
                    <div class="team-score-container">
                        <div class="team-score" id="blue-score">0</div>
                        <div class="score-box" id="blue-score-box" title="Clique para subtrair 1"></div>
                    </div>
                </div>
                <div class="foul-box foul-blue" id="blue-foul">
                    <span id="blue-foul-count">0</span>
                    <div class="foul-box-click" id="blue-foul-click" title="Clique para subtrair 1 falta"></div>
                </div>
            </div>
        </div>

        <!-- CONTROLES DOS TIMES -->
        <div class="team-controls">
            <div class="control-group">
                <div class="control-row">
                    <button class="btn btn-point" data-team="white" data-points="1">+1</button>
                    <button class="btn btn-point" data-team="white" data-points="2">+2</button>
                </div>
                <div class="control-row">
                    <button class="btn btn-point" data-team="white" data-points="3">+3</button>
                    <button class="btn btn-foul" data-team="white" data-fouls="1">Falta</button>
                </div>
            </div>
            <div class="control-group">
                <div class="control-row">
                    <button class="btn btn-point" data-team="blue" data-points="1">+1</button>
                    <button class="btn btn-point" data-team="blue" data-points="2">+2</button>
                </div>
                <div class="control-row">
                    <button class="btn btn-point" data-team="blue" data-points="3">+3</button>
                    <button class="btn btn-foul" data-team="blue" data-fouls="1">Falta</button>
                </div>
            </div>
        </div>

        <!-- PERÍODO -->
        <div class="period-display">
            <button class="btn" id="prev-period">−</button>
            <span class="period-text" id="period-display">1º Período</span>
            <button class="btn" id="next-period">+</button>
        </div>

        <!-- CRONÔMETRO DE JOGO -->
        <div class="timer-container">
            <div class="timer-box">
                <button class="btn" id="game-time-dec">−</button>
                <div>
                    <div class="timer-display" id="game-time-display">12:00</div>
                    <div class="timer-label">TEMPO DE JOGO</div>
                </div>
                <button class="btn" id="game-time-inc">+</button>
            </div>
            <div class="timer-controls">
                <button class="btn btn-start" id="start-pause-game">Iniciar Jogo</button>
            </div>
        </div>

        <!-- CRONÔMETRO DE POSSE -->
        <div class="timer-container" id="shot-clock-container">
            <div class="timer-box">
                <button class="btn" id="shot-clock-dec">−</button>
                <div>
                    <div class="timer-display" id="shot-clock-display">24</div>
                    <div class="timer-label">TEMPO DE POSSE</div>
                </div>
                <button class="btn" id="shot-clock-inc">+</button>
            </div>
            <div class="timer-controls">
                <button class="btn btn-reset" id="reset-shot-24">24s</button>
                <button class="btn btn-reset" id="reset-shot-14">14s</button>
                <button class="btn btn-reset" id="reset-shot-12">12s</button>
            </div>
        </div>

        <!-- AÇÕES RÁPIDAS -->
        <div class="action-buttons">
            <div class="action-row">
                <button class="btn btn-action btn-timeout" id="time-request">TEMPO</button>
                <button class="btn btn-action btn-horn" id="horn-button">BUZINA</button>
            </div>
            <div class="action-row">
                <button class="btn btn-action btn-fullscreen" id="fullscreen-button">TELA CHEIA</button>
                <button class="btn btn-action btn-simple" id="simple-button">SIMPLES</button>
                <button class="btn btn-action btn-config" id="config-button">CONFIG</button>
            </div>
        </div>

        <!-- MENU CONFIG -->
        <div class="config-menu" id="config-menu">
            <div class="input-group">
                <label for="white-team-name">Time Branco:</label>
                <input type="text" id="white-team-name" placeholder="Nome" value="Branco">
            </div>
            <div class="input-group">
                <label for="blue-team-name">Time Azul:</label>
                <input type="text" id="blue-team-name" placeholder="Nome" value="Azul">
            </div>
            <div class="input-group">
                <label for="voice-select">Voz de Anúncio:</label>
                <select id="voice-select"></select>
            </div>
            <div class="input-group">
                <label>Modo de Jogo:</label>
                <div class="game-mode-selector">
                    <button class="mode-btn active" data-mode="fiba">FIBA</button>
                    <button class="mode-btn" data-mode="3x3">3x3</button>
                </div>
            </div>
            <div class="toggle-container">
                <span class="toggle-label">Cronômetro de Posse</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="shot-clock-toggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="input-group">
                <label>Tempo de Jogo (minutos):</label>
                <div class="time-options">
                    <button class="btn time-option" data-minutes="5">5</button>
                    <button class="btn time-option" data-minutes="10">10</button>
                    <button class="btn time-option" data-minutes="12">12</button>
                    <button class="btn time-option" data-minutes="15">15</button>
                </div>
            </div>
            <div class="config-buttons">
                <button class="btn" id="save-config">Salvar</button>
                <button class="btn" id="reset-all">Resetar</button>
            </div>
        </div>
    </div>

    <!-- =================== MODO SIMPLES =================== -->
    <div class="simple-mode" id="simple-mode">
        <div class="simple-scoreboard" id="simple-scoreboard">

            <!-- Time Branco -->
            <div class="simple-team">
                <div class="simple-team-name simple-team-name-white" id="simple-white-team-name">Branco</div>
                <div class="simple-team-score" id="simple-white-score">
                    <span>0</span>
                    <div class="score-box" id="simple-white-score-box" title="Clique para subtrair 1"></div>
                </div>
                <div class="simple-team-fouls" id="simple-white-foul">
                    <span id="simple-white-foul-count">0</span>
                    <div class="foul-box-click" id="simple-white-foul-click" title="Clique para subtrair 1 falta"></div>
                </div>
            </div>

            <!-- Centro -->
            <div class="simple-center">
                <img src="basquete.gif" alt="Basquete" class="simple-logo" id="simple-logo-close">
                <div class="simple-period" id="simple-period-display">1º Período</div>
                <div class="simple-timer">
                    <span class="simple-game-minutes" id="simple-game-minutes">12</span>
                    <span class="simple-game-seconds" id="simple-game-seconds">00</span>
                </div>
                <div class="simple-divider"></div>
                <div class="simple-shot-clock-container" id="simple-shot-clock-container">
                    <span class="simple-shot-clock" id="simple-shot-clock-display">24</span>
                </div>
            </div>

            <!-- Time Azul -->
            <div class="simple-team">
                <div class="simple-team-name simple-team-name-blue" id="simple-blue-team-name">Azul</div>
                <div class="simple-team-score blue" id="simple-blue-score">
                    <span>0</span>
                    <div class="score-box" id="simple-blue-score-box" title="Clique para subtrair 1"></div>
                </div>
                <div class="simple-team-fouls blue" id="simple-blue-foul">
                    <span id="simple-blue-foul-count">0</span>
                    <div class="foul-box-click" id="simple-blue-foul-click" title="Clique para subtrair 1 falta"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Botão instalar -->
    <button id="installButton">Instalar App</button>

    <script>
        // ============================================================
        //  CÓDIGO PRINCIPAL
        // ============================================================

        (() => {
            'use strict';

            // ---------- CONSTANTES ----------
            const MAX_SCORE = 200;
            const MAX_PERIODS_FIBA = 4;
            const MAX_PERIODS_3X3 = 1;
            const OVERTIME_FIBA = 5 * 60;
            const OVERTIME_3X3 = 60;
            const DEFAULT_FIBA = 12 * 60;
            const DEFAULT_3X3 = 10 * 60;

            // ---------- ESTADO ----------
            const state = {
                whiteScore: 0,
                blueScore: 0,
                whiteFouls: 0,
                blueFouls: 0,
                whiteName: 'Branco',
                blueName: 'Azul',
                currentPeriod: 1,
                gameMode: 'fiba', // 'fiba' | '3x3'
                configuredGameTime: DEFAULT_FIBA,
                gameTime: DEFAULT_FIBA,
                shotClockTime: 24,
                isGameRunning: false,
                isShotClockRunning: false,
                isShotClockEnabled: true,
                isFullscreen: false,
                isSimpleMode: false,
                isConfigOpen: false,
                gameInterval: null,
                shotClockInterval: null,
                lastAnnouncedShot: -1,
                voices: [],
                selectedVoice: null,
            };

            // ---------- ELEMENTOS DOM ----------
            const $ = id => document.getElementById(id);
            const el = {
                whiteScore: $('white-score'),
                blueScore: $('blue-score'),
                whiteFoulCount: $('white-foul-count'),
                blueFoulCount: $('blue-foul-count'),
                whiteNameDisplay: $('white-team-name-display'),
                blueNameDisplay: $('blue-team-name-display'),
                gameTimeDisplay: $('game-time-display'),
                shotClockDisplay: $('shot-clock-display'),
                periodDisplay: $('period-display'),
                configMenu: $('config-menu'),
                simpleMode: $('simple-mode'),
                simpleWhiteScore: $('simple-white-score').querySelector('span'),
                simpleBlueScore: $('simple-blue-score').querySelector('span'),
                simpleWhiteFoulCount: $('simple-white-foul-count'),
                simpleBlueFoulCount: $('simple-blue-foul-count'),
                simpleWhiteName: $('simple-white-team-name'),
                simpleBlueName: $('simple-blue-team-name'),
                simpleGameMinutes: $('simple-game-minutes'),
                simpleGameSeconds: $('simple-game-seconds'),
                simpleShotClock: $('simple-shot-clock-display'),
                simplePeriod: $('simple-period-display'),
                simpleShotClockContainer: $('simple-shot-clock-container'),
                shotClockContainer: $('shot-clock-container'),
                startPauseBtn: $('start-pause-game'),
                fullscreenBtn: $('fullscreen-button'),
                simpleBtn: $('simple-button'),
                configBtn: $('config-button'),
                voiceSelect: $('voice-select'),
                whiteNameInput: $('white-team-name'),
                blueNameInput: $('blue-team-name'),
                shotClockToggle: $('shot-clock-toggle'),
                fibaModeBtn: document.querySelector('[data-mode="fiba"]'),
                threex3ModeBtn: document.querySelector('[data-mode="3x3"]'),
                installBtn: $('installButton'),
            };

            // ---------- UTILITÁRIOS ----------
            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function speak(text) {
                if (!window.speechSynthesis || !state.selectedVoice) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.voice = state.selectedVoice;
                u.rate = 1.0;
                u.pitch = 1.0;
                window.speechSynthesis.speak(u);
            }

            function playHorn() {
                try {
                    const audio = new Audio('buzina.mp3');
                    audio.play().catch(() => {});
                } catch (_) {}
            }

            function scoreUpdateEffect(el) {
                el.classList.add('score-updated');
                setTimeout(() => el.classList.remove('score-updated'), 300);
            }

            // ---------- ATUALIZAÇÃO DA INTERFACE ----------
            function updateAll() {
                // Placar
                el.whiteScore.textContent = state.whiteScore;
                el.blueScore.textContent = state.blueScore;
                el.simpleWhiteScore.textContent = state.whiteScore;
                el.simpleBlueScore.textContent = state.blueScore;

                // Faltas
                el.whiteFoulCount.textContent = state.whiteFouls;
                el.blueFoulCount.textContent = state.blueFouls;
                el.simpleWhiteFoulCount.textContent = state.whiteFouls;
                el.simpleBlueFoulCount.textContent = state.blueFouls;

                // Nomes
                el.whiteNameDisplay.textContent = state.whiteName;
                el.blueNameDisplay.textContent = state.blueName;
                el.simpleWhiteName.textContent = state.whiteName;
                el.simpleBlueName.textContent = state.blueName;

                // Cronômetros
                updateGameTimeDisplay();
                updateShotClockDisplay();

                // Período
                updatePeriodDisplay();

                // Faltas - piscar
                updateFoulsBlink();

                // Posse
                el.shotClockContainer.style.display = state.isShotClockEnabled ? 'flex' : 'none';
                el.simpleShotClockContainer.classList.toggle('hidden', !state.isShotClockEnabled);

                // Botão iniciar/pausar
                el.startPauseBtn.textContent = state.isGameRunning ? 'Pausar Jogo' : 'Iniciar Jogo';
            }

            function updateGameTimeDisplay() {
                const t = state.gameTime;
                el.gameTimeDisplay.textContent = formatTime(t);
                el.simpleGameMinutes.textContent = Math.floor(t / 60);
                el.simpleGameSeconds.textContent = (t % 60).toString().padStart(2, '0');
            }

            function updateShotClockDisplay() {
                el.shotClockDisplay.textContent = state.shotClockTime;
                el.simpleShotClock.textContent = state.shotClockTime;
            }

            function updatePeriodDisplay() {
                let txt;
                if (state.gameMode === 'fiba') {
                    if (state.currentPeriod <= MAX_PERIODS_FIBA) {
                        txt = `${state.currentPeriod}º Período`;
                    } else {
                        txt = `Prorrogação ${state.currentPeriod - MAX_PERIODS_FIBA}`;
                    }
                } else {
                    txt = (state.currentPeriod <= MAX_PERIODS_3X3) ? '3x3' : `Prorrogação ${state.currentPeriod - MAX_PERIODS_3X3}`;
                }
                el.periodDisplay.textContent = txt;
                el.simplePeriod.textContent = txt;
            }

            function updateFoulsBlink() {
                const whiteLimit = (state.gameMode === 'fiba') ? 5 : 7;
                const blueLimit = (state.gameMode === 'fiba') ? 5 : 7;

                const wFoulBox = document.getElementById('white-foul');
                const bFoulBox = document.getElementById('blue-foul');
                const swFoulBox = document.getElementById('simple-white-foul');
                const sbFoulBox = document.getElementById('simple-blue-foul');

                wFoulBox.classList.toggle('blinking', state.whiteFouls >= whiteLimit);
                bFoulBox.classList.toggle('blinking', state.blueFouls >= blueLimit);
                swFoulBox.classList.toggle('blinking', state.whiteFouls >= whiteLimit);
                sbFoulBox.classList.toggle('blinking', state.blueFouls >= blueLimit);
            }

            // ---------- LÓGICA DE PONTOS E FALTAS ----------
            function adjustScore(team, points, silent = false) {
                const isWhite = team === 'white';
                let current = isWhite ? state.whiteScore : state.blueScore;
                let newVal = Math.max(0, Math.min(MAX_SCORE, current + points));
                if (isWhite) state.whiteScore = newVal;
                else state.blueScore = newVal;

                const scoreEl = isWhite ? el.whiteScore : el.blueScore;
                const simpleEl = isWhite ? el.simpleWhiteScore : el.simpleBlueScore;
                scoreEl.textContent = newVal;
                simpleEl.textContent = newVal;
                scoreUpdateEffect(scoreEl);
                if (state.isSimpleMode) scoreUpdateEffect(simpleEl);

                if (!silent) {
                    const name = isWhite ? state.whiteName : state.blueName;
                    speak(`${name} ${newVal} ${newVal === 1 ? 'ponto' : 'pontos'}`);
                }
            }

            function adjustFouls(team, fouls, silent = false) {
                const isWhite = team === 'white';
                let current = isWhite ? state.whiteFouls : state.blueFouls;
                let newVal = Math.max(0, current + fouls);
                if (isWhite) state.whiteFouls = newVal;
                else state.blueFouls = newVal;

                const foulEl = isWhite ? el.whiteFoulCount : el.blueFoulCount;
                const simpleEl = isWhite ? el.simpleWhiteFoulCount : el.simpleBlueFoulCount;
                foulEl.textContent = newVal;
                simpleEl.textContent = newVal;
                updateFoulsBlink();

                if (!silent) {
                    const name = isWhite ? state.whiteName : state.blueName;
                    const limit = (state.gameMode === 'fiba') ? 5 : 7;
                    if (newVal >= limit) {
                        speak(`${name} com faltas estouradas!`);
                    } else {
                        speak(`${name} ${newVal} ${newVal === 1 ? 'falta' : 'faltas'}`);
                    }
                }
            }

            // ---------- CRONÔMETROS ----------
            function startGameTimer() {
                if (state.isGameRunning) return;
                state.isGameRunning = true;
                el.startPauseBtn.textContent = 'Pausar Jogo';
                state.gameInterval = setInterval(() => {
                    state.gameTime--;
                    updateGameTimeDisplay();
                    if (state.gameTime <= 0) {
                        clearInterval(state.gameInterval);
                        clearInterval(state.shotClockInterval);
                        state.isGameRunning = false;
                        state.isShotClockRunning = false;
                        el.startPauseBtn.textContent = 'Iniciar Jogo';
                        playHorn();
                        speak('Fim de período!');
                        setTimeout(() => nextPeriod(), 2000);
                    }
                }, 1000);
            }

            function pauseGame() {
                if (state.gameInterval) {
                    clearInterval(state.gameInterval);
                    state.gameInterval = null;
                }
                if (state.shotClockInterval) {
                    clearInterval(state.shotClockInterval);
                    state.shotClockInterval = null;
                }
                state.isGameRunning = false;
                state.isShotClockRunning = false;
                el.startPauseBtn.textContent = 'Iniciar Jogo';
            }

            function toggleGameTimer() {
                if (state.isGameRunning) {
                    pauseGame();
                    speak('Jogo pausado');
                } else {
                    startGameTimer();
                    startShotClock(true);
                }
            }

            function startShotClock(reset = false) {
                if (!state.isShotClockEnabled) return;
                if (state.isShotClockRunning && !reset) return;
                state.isShotClockRunning = true;
                state.lastAnnouncedShot = -1;
                if (state.shotClockInterval) clearInterval(state.shotClockInterval);
                state.shotClockInterval = setInterval(() => {
                    state.shotClockTime--;
                    updateShotClockDisplay();
                    // Anúncios
                    if (state.shotClockTime === 10 || state.shotClockTime === 5 || (state.shotClockTime > 0 && state
                            .shotClockTime <= 3)) {
                        if (state.shotClockTime !== state.lastAnnouncedShot) {
                            speak(state.shotClockTime.toString());
                            state.lastAnnouncedShot = state.shotClockTime;
                        }
                    } else {
                        state.lastAnnouncedShot = -1;
                    }
                    if (state.shotClockTime <= 0) {
                        clearInterval(state.shotClockInterval);
                        state.shotClockInterval = null;
                        state.isShotClockRunning = false;
                        state.shotClockTime = (state.gameMode === 'fiba') ? 24 : 12;
                        updateShotClockDisplay();
                        playHorn();
                    }
                }, 1000);
            }

            function resetShotClock(value) {
                if (!state.isShotClockEnabled) return;
                state.shotClockTime = value;
                updateShotClockDisplay();
                startShotClock(true);
            }

            // ---------- PERÍODO ----------
            function nextPeriod() {
                pauseGame();
                const maxPeriods = (state.gameMode === 'fiba') ? MAX_PERIODS_FIBA : MAX_PERIODS_3X3;
                state.currentPeriod++;
                if (state.currentPeriod > maxPeriods + 10) state.currentPeriod = maxPeriods + 1; // segurança
                // Ajusta tempo
                if (state.gameMode === 'fiba') {
                    state.gameTime = (state.currentPeriod <= MAX_PERIODS_FIBA) ? state.configuredGameTime : OVERTIME_FIBA;
                } else {
                    state.gameTime = (state.currentPeriod <= MAX_PERIODS_3X3) ? state.configuredGameTime : OVERTIME_3X3;
                }
                updateAll();
                if (state.gameMode === 'fiba') {
                    const p = state.currentPeriod;
                    if (p <= MAX_PERIODS_FIBA) speak(`Início do ${p}º período`);
                    else speak(`Início da ${p - MAX_PERIODS_FIBA}ª prorrogação`);
                } else {
                    const p = state.currentPeriod;
                    if (p <= MAX_PERIODS_3X3) speak('Início do 3x3');
                    else speak(`Início da ${p - MAX_PERIODS_3X3}ª prorrogação`);
                }
            }

            function prevPeriod() {
                if (state.currentPeriod > 1) {
                    pauseGame();
                    state.currentPeriod--;
                    if (state.gameMode === 'fiba') {
                        state.gameTime = (state.currentPeriod <= MAX_PERIODS_FIBA) ? state.configuredGameTime : OVERTIME_FIBA;
                    } else {
                        state.gameTime = (state.currentPeriod <= MAX_PERIODS_3X3) ? state.configuredGameTime : OVERTIME_3X3;
                    }
                    updateAll();
                }
            }

            // ---------- MODO DE JOGO ----------
            function setGameMode(mode) {
                state.gameMode = mode;
                const isFiba = mode === 'fiba';
                el.fibaModeBtn.classList.toggle('active', isFiba);
                el.threex3ModeBtn.classList.toggle('active', !isFiba);
                state.configuredGameTime = isFiba ? DEFAULT_FIBA : DEFAULT_3X3;
                state.gameTime = state.configuredGameTime;
                state.shotClockTime = isFiba ? 24 : 12;
                state.currentPeriod = 1;
                pauseGame();
                updateAll();
                localStorage.setItem('gameMode', mode);
                localStorage.setItem('configuredGameTime', state.configuredGameTime);
                speak(`Modo ${isFiba ? 'FIBA' : '3x3'} selecionado`);
            }

            // ---------- CONFIGURAÇÕES ----------
            function saveSettings() {
                const wn = el.whiteNameInput.value.trim() || 'Branco';
                const bn = el.blueNameInput.value.trim() || 'Azul';
                state.whiteName = wn;
                state.blueName = bn;
                state.isShotClockEnabled = el.shotClockToggle.checked;
                const idx = parseInt(el.voiceSelect.value);
                if (state.voices[idx]) state.selectedVoice = state.voices[idx];
                updateAll();
                localStorage.setItem('whiteName', wn);
                localStorage.setItem('blueName', bn);
                localStorage.setItem('isShotClockEnabled', state.isShotClockEnabled);
                localStorage.setItem('selectedVoice', idx);
                speak('Configurações salvas');
                toggleConfig(false);
            }

            function loadSettings() {
                const wn = localStorage.getItem('whiteName');
                const bn = localStorage.getItem('blueName');
                const sc = localStorage.getItem('isShotClockEnabled');
                const sv = localStorage.getItem('selectedVoice');
                const gm = localStorage.getItem('gameMode');
                const gt = localStorage.getItem('configuredGameTime');

                if (wn) { state.whiteName = wn;
                    el.whiteNameInput.value = wn; }
                if (bn) { state.blueName = bn;
                    el.blueNameInput.value = bn; }
                if (sc !== null) {
                    state.isShotClockEnabled = sc === 'true';
                    el.shotClockToggle.checked = state.isShotClockEnabled;
                }
                if (gm) {
                    state.gameMode = gm;
                    setGameMode(gm); // atualiza UI
                }
                if (gt) {
                    state.configuredGameTime = parseInt(gt);
                    state.gameTime = state.configuredGameTime;
                }
                if (sv !== null && state.voices[sv]) {
                    state.selectedVoice = state.voices[sv];
                    el.voiceSelect.value = sv;
                }
                updateAll();
            }

            function resetAll() {
                pauseGame();
                state.whiteScore = 0;
                state.blueScore = 0;
                state.whiteFouls = 0;
                state.blueFouls = 0;
                state.currentPeriod = 1;
                state.gameTime = state.configuredGameTime;
                state.shotClockTime = (state.gameMode === 'fiba') ? 24 : 12;
                updateAll();
                speak('Placar resetado');
            }

            function toggleConfig(open) {
                state.isConfigOpen = (open !== undefined) ? open : !state.isConfigOpen;
                el.configMenu.classList.toggle('open', state.isConfigOpen);
                el.configBtn.textContent = state.isConfigOpen ? 'FECHAR' : 'CONFIG';
            }

            // ---------- MODO SIMPLES ----------
            function toggleSimpleMode() {
                state.isSimpleMode = !state.isSimpleMode;
                el.simpleMode.classList.toggle('active', state.isSimpleMode);
                document.body.style.cursor = state.isSimpleMode ? 'none' : '';
                if (state.isSimpleMode && !state.isFullscreen) {
                    toggleFullscreen();
                }
            }

            // ---------- TELA CHEIA ----------
            function toggleFullscreen() {
                if (!state.isFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                    state.isFullscreen = true;
                    el.fullscreenBtn.textContent = 'SAIR TELA CHEIA';
                } else {
                    document.exitFullscreen().catch(() => {});
                    state.isFullscreen = false;
                    el.fullscreenBtn.textContent = 'TELA CHEIA';
                }
            }

            // ---------- VOZES ----------
            function loadVoices() {
                let attempts = 0;
                const maxAttempts = 10;
                const check = () => {
                    state.voices = window.speechSynthesis.getVoices();
                    if (state.voices.length > 0 || attempts >= maxAttempts) {
                        el.voiceSelect.innerHTML = '';
                        state.voices.forEach((v, i) => {
                            const opt = document.createElement('option');
                            opt.value = i;
                            opt.textContent = `${v.name} (${v.lang})`;
                            el.voiceSelect.appendChild(opt);
                        });
                        if (state.voices.length) {
                            const saved = parseInt(localStorage.getItem('selectedVoice'));
                            if (state.voices[saved]) {
                                state.selectedVoice = state.voices[saved];
                                el.voiceSelect.value = saved;
                            } else {
                                state.selectedVoice = state.voices[0];
                                el.voiceSelect.value = 0;
                            }
                        }
                    } else {
                        attempts++;
                        setTimeout(check, 100);
                    }
                };
                check();
            }

            // ---------- EVENTOS ----------
            function setupEvents() {
                // Pontos
                document.querySelectorAll('.btn-point').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const team = btn.dataset.team;
                        const pts = parseInt(btn.dataset.points);
                        adjustScore(team, pts);
                    });
                });
                // Faltas
                document.querySelectorAll('.btn-foul').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const team = btn.dataset.team;
                        adjustFouls(team, 1);
                    });
                });
                // Subtrair com clique nas caixas
                el.whiteScoreBox = document.querySelector('#white-score-box');
                el.blueScoreBox = document.querySelector('#blue-score-box');
                el.whiteFoulClick = document.querySelector('#white-foul-click');
                el.blueFoulClick = document.querySelector('#blue-foul-click');
                el.simpleWhiteScoreBox = document.querySelector('#simple-white-score-box');
                el.simpleBlueScoreBox = document.querySelector('#simple-blue-score-box');
                el.simpleWhiteFoulClick = document.querySelector('#simple-white-foul-click');
                el.simpleBlueFoulClick = document.querySelector('#simple-blue-foul-click');

                const addSubListeners = () => {
                    el.whiteScoreBox.addEventListener('click', () => adjustScore('white', -1, true));
                    el.blueScoreBox.addEventListener('click', () => adjustScore('blue', -1, true));
                    el.whiteFoulClick.addEventListener('click', () => adjustFouls('white', -1, true));
                    el.blueFoulClick.addEventListener('click', () => adjustFouls('blue', -1, true));
                    el.simpleWhiteScoreBox.addEventListener('click', () => adjustScore('white', -1, true));
                    el.simpleBlueScoreBox.addEventListener('click', () => adjustScore('blue', -1, true));
                    el.simpleWhiteFoulClick.addEventListener('click', () => adjustFouls('white', -1, true));
                    el.simpleBlueFoulClick.addEventListener('click', () => adjustFouls('blue', -1, true));
                };
                addSubListeners();

                // Período
                document.getElementById('next-period').addEventListener('click', nextPeriod);
                document.getElementById('prev-period').addEventListener('click', prevPeriod);

                // Cronômetro jogo
                document.getElementById('game-time-inc').addEventListener('click', () => {
                    state.gameTime += 10;
                    updateGameTimeDisplay();
                });
                document.getElementById('game-time-dec').addEventListener('click', () => {
                    state.gameTime = Math.max(0, state.gameTime - 10);
                    updateGameTimeDisplay();
                });
                document.getElementById('start-pause-game').addEventListener('click', toggleGameTimer);

                // Cronômetro posse
                document.getElementById('shot-clock-inc').addEventListener('click', () => {
                    state.shotClockTime = Math.min(99, state.shotClockTime + 1);
                    updateShotClockDisplay();
                });
                document.getElementById('shot-clock-dec').addEventListener('click', () => {
                    state.shotClockTime = Math.max(0, state.shotClockTime - 1);
                    updateShotClockDisplay();
                });
                document.getElementById('reset-shot-24').addEventListener('click', () => resetShotClock(24));
                document.getElementById('reset-shot-14').addEventListener('click', () => resetShotClock(14));
                document.getElementById('reset-shot-12').addEventListener('click', () => resetShotClock(12));

                // Ações
                document.getElementById('time-request').addEventListener('click', () => {
                    playHorn();
                    setTimeout(() => speak('Pedido de tempo'), 500);
                });
                document.getElementById('horn-button').addEventListener('click', playHorn);
                document.getElementById('fullscreen-button').addEventListener('click', toggleFullscreen);
                document.getElementById('simple-button').addEventListener('click', toggleSimpleMode);
                document.getElementById('config-button').addEventListener('click', () => toggleConfig());
                document.getElementById('save-config').addEventListener('click', saveSettings);
                document.getElementById('reset-all').addEventListener('click', resetAll);

                // Config - modo de jogo
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', () => setGameMode(btn.dataset.mode));
                });

                // Config - tempo de jogo
                document.querySelectorAll('.time-option').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const min = parseInt(btn.dataset.minutes);
                        state.configuredGameTime = min * 60;
                        state.gameTime = state.configuredGameTime;
                        updateGameTimeDisplay();
                        localStorage.setItem('configuredGameTime', state.configuredGameTime);
                        speak(`Tempo definido para ${min} minutos`);
                    });
                });

                // Config - posse
                el.shotClockToggle.addEventListener('change', () => {
                    state.isShotClockEnabled = el.shotClockToggle.checked;
                    localStorage.setItem('isShotClockEnabled', state.isShotClockEnabled);
                    updateAll();
                    if (!state.isShotClockEnabled) {
                        if (state.shotClockInterval) {
                            clearInterval(state.shotClockInterval);
                            state.shotClockInterval = null;
                        }
                        state.isShotClockRunning = false;
                    }
                });

                // Fechar simples com logo
                document.getElementById('simple-logo-close').addEventListener('click', toggleSimpleMode);

                // Instalar PWA
                let deferredPrompt;
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    el.installBtn.style.display = 'block';
                });
                el.installBtn.addEventListener('click', () => {
                    el.installBtn.style.display = 'none';
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
                });

                // Teclado
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    const key = e.key;
                    if (key === '4' || key === 'ArrowLeft') adjustScore('white', 1);
                    else if (key === '6' || key === 'ArrowRight') adjustScore('blue', 1);
                    else if (key === '1') adjustFouls('white', 1);
                    else if (key === '3') adjustFouls('blue', 1);
                    else if (key === '0') { playHorn();
                        setTimeout(() => speak('Pedido de tempo'), 500); }
                    else if (key === 'Enter' || key === '+') toggleGameTimer();
                    else if (key === '7') resetShotClock(24);
                    else if (key === '8') resetShotClock(14);
                    else if (key === '9') resetShotClock(12);
                });

                // Swipe no modo simples
                let touchStartX = 0,
                    touchStartY = 0;
                const simpleBoard = document.getElementById('simple-scoreboard');
                simpleBoard.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                    touchStartY = e.changedTouches[0].screenY;
                }, { passive: true });
                simpleBoard.addEventListener('touchend', (e) => {
                    const dx = e.changedTouches[0].screenX - touchStartX;
                    const dy = e.changedTouches[0].screenY - touchStartY;
                    const threshold = 50;
                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > threshold) adjustScore('white', 1);
                        else if (dx < -threshold) adjustScore('blue', 1);
                    } else {
                        if (dy > threshold) adjustFouls('white', 1);
                        else if (dy < -threshold) adjustFouls('blue', 1);
                    }
                }, { passive: true });
            }

            // ---------- INICIALIZAÇÃO ----------
            function init() {
                // Carregar vozes
                loadVoices();
                // Carregar configurações
                loadSettings();
                // Atualizar UI
                updateAll();
                // Eventos
                setupEvents();
                // Registrar Service Worker
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('sw.js')
                            .then(() => console.log('SW registrado'))
                            .catch(() => console.log('Falha no SW'));
                    });
                }
                console.log('Aplicação inicializada');
            }

            // Inicia quando DOM estiver pronto
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
